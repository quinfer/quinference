[build]
command = 'hugo'
publish = 'public'

[functions]
directory = 'netlify/functions'
[build.environment]
HUGO_VERSION = '0.92.1'


[context]
[context.branch-deploy]
command = 'hugo -F -b $DEPLOY_PRIME_URL'

[context.deploy-preview]
command = 'hugo -F -b $DEPLOY_PRIME_URL'

[context.production]
[context.production.environment]
HUGO_ENV = 'production'

# Former standalone sections merged into /research/
[[redirects]]
  from = "/publications"
  to = "/research/"
  status = 301

[[redirects]]
  from = "/publications/"
  to = "/research/"
  status = 301

[[redirects]]
  from = "/working_papers"
  to = "/research/"
  status = 301

[[redirects]]
  from = "/working_papers/"
  to = "/research/"
  status = 301
