[build]
# Render .qmd → Hugo markdown, then Hugo (see _quarto.yml, https://quarto.org/docs/output-formats/hugo.html)
command = "curl -fsSL https://github.com/quarto-dev/quarto-cli/releases/download/v1.8.24/quarto-1.8.24-linux-amd64.tar.gz -o /tmp/quarto.tgz && tar -xzf /tmp/quarto.tgz -C /tmp && export PATH=/tmp/quarto-1.8.24/bin:$PATH && quarto render && hugo"
publish = 'public'

[functions]
directory = 'netlify/functions'
[build.environment]
HUGO_VERSION = '0.92.1'


[context]
[context.branch-deploy]
command = 'hugo -F -b $DEPLOY_PRIME_URL'

[context.deploy-preview]
command = 'hugo -F -b $DEPLOY_PRIME_URL'

[context.production]
[context.production.environment]
HUGO_ENV = 'production'

# Former standalone sections merged into /research/
[[redirects]]
  from = "/publications"
  to = "/research/"
  status = 301

[[redirects]]
  from = "/publications/"
  to = "/research/"
  status = 301

[[redirects]]
  from = "/working_papers"
  to = "/research/"
  status = 301

[[redirects]]
  from = "/working_papers/"
  to = "/research/"
  status = 301

[[redirects]]
  from = "/qrap"
  to = "/teaching/#teaching-innovations-archived-from-qub"
  status = 301

[[redirects]]
  from = "/qrap/"
  to = "/teaching/#teaching-innovations-archived-from-qub"
  status = 301
